                            Edit
                        </button>
                    </td>
                </tr>
                <tr id="row-1">
                    <td>
                        Angie MacDowell
                    </td>

                    </td>

                    </td>

                    </td>
                    <td>
                        <button id="edit-row-3" data-on:click=" $_editing = true; @get('/edit-row/3')" data-indicator:_fetching="" data-attr:disabled="$_fetching || $_editing">
                            Edit
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
        <div>
            <button id="reset" data-on:click="$_editing = false; @put('/edit-row/reset')" data-indicator:_fetching="" data-attr:disabled="$_fetching">
                <i class="pixelarticons:user-plus">
                </i>
                Reset
            </button>
        </div>
        </div>

</html>
