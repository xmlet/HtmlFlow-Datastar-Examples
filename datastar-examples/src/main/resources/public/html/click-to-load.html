<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Click to Load</title>
    <script type="module"
            src="/js/datastar.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="description" data-init="@get('/click-to-load/description')"></div>
<div
        id="demo"
        data-signals:offset="0"
        data-signals:limit="5"
>
    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>ID</th>
        </tr>
        </thead>
        <tbody id="agents">
        </tbody>
    </table>
    <button
            data-indicator="_fetching"
            data-attr:disabled="$_fetching"
            data-on:click="!$_fetching && @get('/click-to-load/more')"
            data-text="$_fetching ? 'Loading...' : 'Load More'"
    >
        Load More
    </button>
</div>
</body>
</html>
