<!DOCTYPE html>
<html lang="en">
<head>
    <script type="module" src="/js/datastar.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div id="description" data-init="@get('/progressive-load/description')"></div>
    <div>
        <div class="actions">
            <button id="load-button"
                    data-signals:load-disabled="false"
                    data-on:click="$loadDisabled=true; @get('/progressive-load/updates')"
                    data-attr:disabled="$loadDisabled"
                    data-indicator:progressive-load="">
                Load
            </button>
            <div data-class:loading="$progressiveLoad" class="indicator">
                <img src="/images/rocket-animated.gif" alt="Indicator" width="32" height="32" loading>
            </div>
        </div>
        <p>Each part is loaded progressively.</p>
        <div id="Load">
            <header id="header"></header>
            <section id="article"></section>
            <section id="comments"></section>
            <div id="footer"></div>
        </div>
    </div>
</body>
</html>
