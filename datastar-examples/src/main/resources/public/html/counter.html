<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Counting Stars</title>
    <script type="module" src="/js/datastar.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body id="body">
<div id="description" data-init="@get('/counter/description')"></div>
<div>
    <h1>Counting Stars</h1>
    <div data-init="@get('/counter/events')">
        <span id="counter">0</span>
    </div>
    <div>
        <button id="decrement" data-on:click="@post('/counter/decrement')">−</button>
        <button id="increment" data-on:click="@post('/counter/increment')">+</button>
    </div>
</div>
</body>
</html>
