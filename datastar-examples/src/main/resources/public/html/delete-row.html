<!DOCTYPE html>
<html>
    <head>
        <script type="module" src="/js/datastar.js"></script>
        <link rel="stylesheet" href="/css/styles.css">
    </head>
    <body>
        <div id="description" data-init="@get('/delete-row/description')"></div>
        <div id="users-table">
            <table>
                <thead>
                <tr>
                    <th>
                        Name
                    </th>
                    <th>
                        Email
                    </th>
                    <th>
                        Actions
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr id="row-0">
                    <td>
                        Joe Smith
                    </td>
                    <td>
                        joe@smith.org
                    </td>
                    <td>
                        <button class="error" data-on:click="confirm('Are you sure?') && @delete('/delete-row/0')" data-indicator:_fetching="" data-attr:disabled="$_fetching">
                            Delete
                        </button>
                    </td>
                </tr>
                <tr id="row-1">
                    <td>
                        Angie MacDowell
                    </td>
                    <td>
                        angie@macdowell.org
                    </td>
                    <td>
                        <button class="error" data-on:click="confirm('Are you sure?') && @delete('/delete-row/1')" data-indicator:_fetching="" data-attr:disabled="$_fetching">
                            Delete
                        </button>
                    </td>
                </tr>
                <tr id="row-2">
                    <td>
                        Fuqua Tarkenton
                    </td>
                    <td>
                        fuqua@tarkenton.org
                    </td>
                    <td>
                        <button class="error" data-on:click="confirm('Are you sure?') && @delete('/delete-row/2')" data-indicator:_fetching="" data-attr:disabled="$_fetching">
                            Delete
                        </button>
                    </td>
                </tr>
                <tr id="row-3">
                    <td>
                        Kim Yee
                    </td>
                    <td>
                        kim@yee.org
                    </td>
                    <td>
                        <button class="error" data-on:click="confirm('Are you sure?') && @delete('/delete-row/3')" data-indicator:_fetching="" data-attr:disabled="$_fetching">
                            Delete
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
            <div>
                <button class="warning" data-on:click="@patch('/delete-row/reset')" data-indicator:_fetching="" data-attr:disabled="$_fetching">
                    <i class="pixelarticons:user-plus">
                    </i>
                    Reset
                </button>
            </div>
        </div>
    </body>
</html>
