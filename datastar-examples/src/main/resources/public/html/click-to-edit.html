<!DOCTYPE html>
<html>
    <head>
        <script type="module" src="/js/datastar.js">
        </script><link rel="stylesheet" href="/css/styles.css">
    </head>
    <body>
        <div id="description" data-init="@get('/click-to-edit/description')"></div>

        <div id="demo">
            <p>First Name: John</p>
            <p>Last Name: Doe</p>
            <p>Email: joe@blow.com</p>
            <div role="group">
                <button
                        id="edit"
                        data-indicator:_fetching
                        data-attr:disabled="$_fetching"
                        data-on:click="@get('/click-to-edit/edit')"
                >
                    Edit
                </button>
                <button
                        id="reset"
                        data-indicator:_fetching
                        data-attr:disabled="$_fetching"
                        data-on:click="@patch('/click-to-edit/reset')"
                >
                    Reset
                </button>
            </div>
        </div>
    </body>
</html>
