name: Datastar Examples CI

on:
  push:
    branches:
      - main
      - development
    paths:
      - 'datastar-examples/**'
      - '.github/workflows/datastar-examples.yml'
  pull_request:
    branches:
      - main
      - development
    paths:
      - 'datastar-examples/**'
      - '.github/workflows/datastar-examples.yml'
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: datastar-examples
    env:
      PLAYWRIGHT_VERSION: 1.48.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright system dependencies
        run: npx --yes playwright@${PLAYWRIGHT_VERSION} install-deps

      - name: Install Playwright browsers (only if cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx --yes playwright@${PLAYWRIGHT_VERSION} install chromium

      - name: Build with Gradle
        run: ./gradlew check --info